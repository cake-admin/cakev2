name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate tokens
        run: npm run validate-tokens

      - name: Run tests
        run: npm run test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false

      # Data-visualization tool (ECharts edition) — built at base /dataviz/ and
      # nested under the main site so it goes live at cake.lenovo.com/dataviz.
      - name: Install dataviz tool dependencies
        working-directory: chart-tool-echarts
        run: npm ci

      - name: Build dataviz tool
        working-directory: chart-tool-echarts
        run: npm run build

      - name: Add dataviz tool to Pages output
        run: |
          mkdir -p build/dataviz
          cp -r chart-tool-echarts/dist/. build/dataviz/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 